#!/bin/bash
# keep_alive.sh

RENDER_URL="https://roommatecharacter.onrender.com/up"
INTERVAL=840  # 14 minutes in seconds

while true; do
  TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
  RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL")
  
  echo "[$TIMESTAMP] Status: $RESPONSE"
  
  if [ "$RESPONSE" != "200" ]; then
    echo "[$TIMESTAMP] ⚠️ Warning: Non-200 response"
  fi
  
  sleep $INTERVAL
done
