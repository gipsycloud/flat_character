#!/bin/bash
# keep_alive.sh

RENDER_URL="https://roommatecharacter.onrender.com/up"
name: Keep Render Awake
on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Render App
        env:
          RENDER_URL: ${{ RENDER_URL }}
        run: |
          echo "=== Keep Alive Ping ==="
          echo "Time: $(date -u)"
          echo "URL: ${RENDER_URL}"
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${RENDER_URL}")
          echo "HTTP Status: ${RESPONSE}"
          
          if [ "${RESPONSE}" = "200" ]; then
            echo "Result: SUCCESS"
            exit 0
          else
            echo "Result: FAILED"
            exit 1
          fi
